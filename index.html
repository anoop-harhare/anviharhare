<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty & Friends Memory Match</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", Arial, sans-serif;
            background: linear-gradient(160deg, #ffe4f2 0%, #f9d7ff 45%, #d7eeff 100%);
            color: #6f2d6f;
            display: flex;
            justify-content: center;
            padding: 18px;
        }

        .app {
            width: 100%;
            max-width: 760px;
        }

        .card-shell {
            background: rgba(255, 255, 255, 0.72);
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 16px 40px rgba(125, 62, 125, 0.15);
            backdrop-filter: blur(2px);
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            color: #ab2f7e;
        }

        .subtitle {
            margin: 8px 0 16px;
            text-align: center;
            color: #7a4a94;
            font-size: 0.98rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat, .btn {
            background: #ffffff;
            border: 2px solid #f7c9e9;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-weight: 700;
            color: #7f427f;
        }

        .stat small {
            display: block;
            font-size: 0.75rem;
            color: #9e6d9e;
            margin-bottom: 3px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            font-size: 0.95rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(138, 66, 138, 0.14);
        }

        .btn.primary {
            background: #ff8fc6;
            border-color: #ff8fc6;
            color: white;
            flex: 1;
        }

        .btn.secondary {
            background: #fff;
            flex: 1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .memory-card {
            position: relative;
            aspect-ratio: 3 / 4;
            border: 0;
            padding: 0;
            background: transparent;
            cursor: pointer;
            perspective: 900px;
        }

        .memory-card:disabled {
            cursor: default;
        }

        .memory-inner {
            position: absolute;
            inset: 0;
            transition: transform 0.45s ease;
            transform-style: preserve-3d;
        }

        .memory-card.is-flipped .memory-inner,
        .memory-card.is-matched .memory-inner {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            user-select: none;
        }

        .front {
            background: linear-gradient(145deg, #ff9fcc 0%, #f5a8ff 100%);
            color: white;
            font-size: 1.7rem;
            border: 2px solid #fff;
            box-shadow: 0 6px 14px rgba(164, 77, 164, 0.2);
        }

        .back {
            transform: rotateY(180deg);
            background: #fff;
            border: 2px solid #f4c8e5;
            color: #7f427f;
            padding: 6px;
            gap: 4px;
        }

        .char-emoji {
            font-size: 1.6rem;
        }

        .char-name {
            font-size: 0.68rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
        }

        .memory-card.is-matched .back {
            border-color: #8edfb8;
            background: #eefcf5;
        }

        .status {
            min-height: 24px;
            margin-top: 14px;
            text-align: center;
            font-weight: 700;
            color: #7a3f83;
        }

        .snake-link {
            display: inline-block;
            margin-top: 10px;
            color: #9f3f8d;
            text-decoration: none;
            font-weight: 700;
        }

        .snake-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 560px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .board {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .char-name {
                font-size: 0.62rem;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="card-shell">
            <h1>🎀 Hello Kitty & Friends Memory Match</h1>
            <p class="subtitle">Find all matching pairs in the fewest moves and fastest time!</p>

            <div class="controls" aria-live="polite">
                <div class="stat"><small>Moves</small><span id="move-count">0</span></div>
                <div class="stat"><small>Time</small><span id="time-count">00:00</span></div>
                <div class="stat"><small>Best (fewest moves)</small><span id="best-score">—</span></div>
            </div>

            <div class="actions">
                <button class="btn primary" id="new-game-btn" type="button">New Game</button>
                <button class="btn secondary" id="shuffle-btn" type="button">Shuffle</button>
            </div>

            <div id="memory-board" class="board" role="grid" aria-label="Memory match game board"></div>
            <div id="status" class="status" aria-live="polite"></div>
            <a href="snake.html" class="snake-link">🐍 Play Snake Game</a>
        </section>
    </main>

    <script>
        const characters = [
            { id: "hello-kitty", name: "Hello Kitty", emoji: "🎀" },
            { id: "my-melody", name: "My Melody", emoji: "🩷" },
            { id: "kuromi", name: "Kuromi", emoji: "💜" },
            { id: "cinnamoroll", name: "Cinnamoroll", emoji: "☁️" },
            { id: "pochacco", name: "Pochacco", emoji: "⚽" },
            { id: "badtz-maru", name: "Badtz-Maru", emoji: "🐧" },
            { id: "keroppi", name: "Keroppi", emoji: "🐸" },
            { id: "pompompurin", name: "Pompompurin", emoji: "🍮" }
        ];

        const boardElement = document.getElementById("memory-board");
        const movesElement = document.getElementById("move-count");
        const timeElement = document.getElementById("time-count");
        const bestElement = document.getElementById("best-score");
        const statusElement = document.getElementById("status");
        const newGameButton = document.getElementById("new-game-btn");
        const shuffleButton = document.getElementById("shuffle-btn");

        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matches = 0;
        let timerId = null;
        let secondsElapsed = 0;
        let hasStarted = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i -= 1) {
                const randomIndex = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[i]];
            }
            return shuffled;
        }

        function formatTime(totalSeconds) {
            const mins = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
            const secs = String(totalSeconds % 60).padStart(2, "0");
            return `${mins}:${secs}`;
        }

        function updateStats() {
            movesElement.textContent = String(moves);
            timeElement.textContent = formatTime(secondsElapsed);
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                secondsElapsed += 1;
                updateStats();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        function setBestScoreIfNeeded() {
            const key = "hello-kitty-memory-best";
            const previousBest = Number(localStorage.getItem(key));
            if (!previousBest || moves < previousBest) {
                localStorage.setItem(key, String(moves));
            }
            const best = Number(localStorage.getItem(key));
            bestElement.textContent = best ? String(best) : "—";
        }

        function loadBestScore() {
            const best = Number(localStorage.getItem("hello-kitty-memory-best"));
            bestElement.textContent = best ? String(best) : "—";
        }

        function resetTurnState() {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        }

        function handleWin() {
            stopTimer();
            setBestScoreIfNeeded();
            statusElement.textContent = `You won in ${moves} moves and ${formatTime(secondsElapsed)}! 🎉`;
        }

        function checkForMatch() {
            const isMatch = firstCard.dataset.characterId === secondCard.dataset.characterId;

            if (isMatch) {
                firstCard.classList.add("is-matched");
                secondCard.classList.add("is-matched");
                firstCard.disabled = true;
                secondCard.disabled = true;
                matches += 1;
                resetTurnState();

                if (matches === characters.length) {
                    handleWin();
                }
                return;
            }

            lockBoard = true;
            window.setTimeout(() => {
                firstCard.classList.remove("is-flipped");
                secondCard.classList.remove("is-flipped");
                resetTurnState();
            }, 700);
        }

        function handleCardClick(event) {
            const card = event.currentTarget;
            if (lockBoard || card === firstCard || card.classList.contains("is-matched")) {
                return;
            }

            if (!hasStarted) {
                hasStarted = true;
                startTimer();
                statusElement.textContent = "";
            }

            card.classList.add("is-flipped");

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            moves += 1;
            updateStats();
            checkForMatch();
        }

        function createCardElement(character) {
            const button = document.createElement("button");
            button.className = "memory-card";
            button.type = "button";
            button.dataset.characterId = character.id;
            button.setAttribute("aria-label", `Memory card for ${character.name}`);

            button.innerHTML = `
                <span class="memory-inner">
                    <span class="face front">🎀</span>
                    <span class="face back">
                        <span class="char-emoji" aria-hidden="true">${character.emoji}</span>
                        <span class="char-name">${character.name}</span>
                    </span>
                </span>
            `;

            button.addEventListener("click", handleCardClick);
            return button;
        }

        function renderBoard() {
            boardElement.innerHTML = "";
            cards.forEach((card) => boardElement.appendChild(card));
        }

        function createDeck() {
            const deckData = shuffleArray([...characters, ...characters]);
            cards = deckData.map(createCardElement);
        }

        function startGame() {
            stopTimer();
            hasStarted = false;
            secondsElapsed = 0;
            moves = 0;
            matches = 0;
            resetTurnState();
            updateStats();
            statusElement.textContent = "Pick two cards to start matching!";
            createDeck();
            renderBoard();
        }

        newGameButton.addEventListener("click", startGame);
        shuffleButton.addEventListener("click", startGame);

        loadBestScore();
        startGame();
    </script>
</body>
</html>
