<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Memory Match Game</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            margin-top: 50px;\n        }\n        .game-grid {\n            display: grid;\n            grid-template-columns: repeat(4, 100px);\n            grid-template-rows: repeat(4, 100px);\n            gap: 10px;\n        }\n        .card {\n            width: 100px;\n            height: 100px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 2em;\n            background-color: #eee;\n            cursor: pointer;\n            border-radius: 10px;\n        }\n        .matched {\n            background-color: #4caf50;\n            cursor: default;\n        }\n        .hidden {\n            background-color: #ccc;\n        }\n        #score {\n            margin: 20px;\n            font-size: 1.5em;\n        }\n    </style>\n</head>\n<body>\n    <h1>Memory Match Game</h1>\n    <div id="score">Score: 0</div>\n    <div class="game-grid" id="game-board"></div>\n    <button onclick="startGame()">Start Game</button>\n    <script>\n        const emojis = ['🐱', '🐱', '🐾', '🐾', '🍩', '🍩', '🍰', '🍰', '⚡', '⚡', '🌟', '🌟', '✨', '✨', '🌈', '🌈'];\n        let gameBoard = document.getElementById('game-board');\n        let scoreDisplay = document.getElementById('score');\n        let score = 0;\n        let cardValues = [];\n        let cardIds = [];\n        let cardsMatched = 0;\n\n        function startGame() {\n            gameBoard.innerHTML = '';\n            score = 0;\n            cardsMatched = 0;\n            scoreDisplay.textContent = `Score: ${score}`;\n            cardValues = [];\n            cardIds = [];\n            const shuffledEmojis = emojis.sort(() => 0.5 - Math.random());\n            for (let i = 0; i < shuffledEmojis.length; i++) {\n                const card = document.createElement('div');\n                card.setAttribute('class', 'card hidden');\n                card.setAttribute('data-id', i);\n                card.addEventListener('click', flipCard);\n                card.innerHTML = '';\n                gameBoard.appendChild(card);\n                cardValues.push(shuffledEmojis[i]);\n            }\n        }\n\n        function flipCard() {\n            let selected = this;\n            let selectedId = selected.getAttribute('data-id');\n            selected.innerHTML = cardValues[selectedId];\n            selected.classList.remove('hidden');\n            cardIds.push(selectedId);\n            if (cardIds.length === 2) {\n                setTimeout(checkMatch, 500);\n            }\n        }\n\n        function checkMatch() {\n            const cards = document.querySelectorAll('.card');\n            const [firstId, secondId] = cardIds;\n            if (cardValues[firstId] === cardValues[secondId]) {\n                cards[firstId].classList.add('matched');\n                cards[secondId].classList.add('matched');\n                score++;\n                scoreDisplay.textContent = `Score: ${score}`;\n                cardsMatched += 2;\n                if (cardsMatched === cardValues.length) {\n                    alert("You won!");\n                }\n            } else {\n                cards[firstId].classList.add('hidden');\n                cards[secondId].classList.add('hidden');\n                cards[firstId].innerHTML = '';\n                cards[secondId].innerHTML = '';\n            }\n            cardIds = [];\n        }\n\n        startGame();\n    </script>\n</body>\n</html>
