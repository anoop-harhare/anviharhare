<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Anvi's World</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            background-color: #fce4ec;
        }
        h1 {
            margin-bottom: 10px;
            text-align: center;
            color: #ad1457;
        }
        .instructions {
            margin-bottom: 20px;
            font-size: 16px;
            color: #6a1b9a;
            text-align: center;
            max-width: 360px;
            line-height: 1.5;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
        }
        .card {
            position: relative;
            width: 100px;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        .card:hover .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border-radius: 8px;
        }
        .card-front {
            background-color: #f8bbd0;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
        }
        .card-back {
            background-color: #fff;
            transform: rotateY(180deg);
            justify-content: center;
        }
        .gif {
            width: 80%;
            height: auto;
        }
        @media (max-width: 400px) {
            .card {
                width: 80px;
                height: 120px;
            }
            .card-front, .card-back {
                font-size: 30px;
            }
            .instructions {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to Anvi's World</h1>
    <p class="instructions">🌸 Flip the cards to see what's hidden!<br>Can you find the special Cinnamoroll? 🐾</p>
    <div class="grid">
        <div class="card">
            <div class="card-inner">
                <div class="card-front">😊</div>
                <div class="card-back"><img class="gif" src="https://media.giphy.com/media/Vuw9m5wXviFIQ/giphy.gif" alt="Rickroll GIF" width="80" height="80"></div>
            </div>
        </div>
        <div class="card"><div class="card-inner"><div class="card-front">🐱</div><div class="card-back">😄</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🌼</div><div class="card-back">🌟</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🎈</div><div class="card-back">💖</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🍀</div><div class="card-back"><img class="gif" src="https://media.giphy.com/media/sIIhZliB2McAo/giphy.gif" alt="Cinnamoroll GIF" width="80" height="80"></div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🦄</div><div class="card-back">🍭</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🍓</div><div class="card-back">🐸</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🌈</div><div class="card-back">🍿</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🦋</div><div class="card-back">🌷</div></div></div>
    </div>
</body>
</html>
