<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Anvi's World</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
        }
        .card {
            position: relative;
            width: 100px;
            height: 150px;
            perspective: 1000px;
        }
        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        .card:hover .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }
        .card-front {
            background-color: #f0f0f0;
        }
        .card-back {
            background-color: #fff;
            transform: rotateY(180deg);
            justify-content: center;
        }
        .gif {
            width: 80%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Welcome to Anvi's World</h1>
    <div class="grid">
        <div class="card">
            <div class="card-inner">
                <div class="card-front">😊</div>
                <div class="card-back"><img class="gif" src="https://media.giphy.com/media/Vuw9m5wXviFIQ/giphy.gif" alt="Rickroll GIF"></div>
            </div>
        </div>
        <div class="card"><div class="card-inner"><div class="card-front">🐱</div><div class="card-back">😄</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🌼</div><div class="card-back">🌟</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🎈</div><div class="card-back">💖</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🍀</div><div class="card-back">🐶</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🦄</div><div class="card-back">🍭</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🍓</div><div class="card-back">🐸</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🌈</div><div class="card-back">🍿</div></div></div>
        <div class="card"><div class="card-inner"><div class="card-front">🦋</div><div class="card-back">🌷</div></div></div>
    </div>
</body>
</html>
