<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Snake – Anvi's World</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            font-family: Arial, sans-serif;
            background-color: #fce4ec;
        }

        h1 {
            font-size: 2rem;
            color: #ad1457;
            margin-bottom: 6px;
            text-align: center;
            animation: title-glow 2s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { text-shadow: 0 0 4px #f48fb1; }
            to   { text-shadow: 0 0 14px #ad1457, 0 0 6px #f48fb1; }
        }

        .subtitle {
            color: #6a1b9a;
            margin-bottom: 20px;
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── Game board: 10×10 grid, 32 px per cell = 320 px ── */
        .board {
            position: relative;
            width: 320px;
            height: 320px;
            background-color: #0d1117;
            background-image:
                linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 32px 32px;
            border: 3px solid #ad1457;
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(173,20,87,.45),
                inset 0 0 20px rgba(0,0,0,.5);
        }

        /* ── Food: pulsing pink dots ── */
        .food {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff80ab, #ff1744);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #ff4081;
            animation: food-pulse 1.2s ease-in-out infinite alternate;
        }

        @keyframes food-pulse {
            from { transform: translate(-50%,-50%) scale(.75); opacity: .7; }
            to   { transform: translate(-50%,-50%) scale(1.3); opacity: 1;  }
        }

        /*
         * ── Snake segments ──
         * Serpentine path through a 10×10 grid (32 px cells).
         * Cell-centre formula:  x = col*32+16,  y = row*32+16
         *   col 0..9 → x 16..304,  row 0..9 → y 16..304
         *
         * Path:  row 0 L→R, row 1 R→L, row 2 L→R …
         *   M 16,16 H 304  V 48  H 16  V 80  H 304 V 112
         *   H 16   V 144  H 304  V 176 H 16  V 208 H 304
         *   V 240  H 16   V 272  H 304 V 304 H 16
         *
         * Path length: 10 × 288 px (H) + 9 × 32 px (V) = 3168 px
         * Duration: 16 s  →  speed ≈ 198 px/s
         * One-cell delay: (32/3168)×16 ≈ 0.16 s
         */
        .seg {
            position: absolute;
            top: 0;
            left: 0;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            offset-path: path('M 16,16 H 304 V 48 H 16 V 80 H 304 V 112 H 16 V 144 H 304 V 176 H 16 V 208 H 304 V 240 H 16 V 272 H 304 V 304 H 16');
            offset-anchor: 50% 50%;
            offset-rotate: 0deg;
            animation: slither 16s linear infinite;
        }

        @keyframes slither {
            from { offset-distance: 0%; }
            to   { offset-distance: 100%; }
        }

        /* Head — brightest, slightly larger */
        .s0 {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            background: #69f0ae;
            box-shadow: 0 0 14px #69f0ae, 0 0 6px #1de9b6;
            z-index: 10;
            animation-delay: 0s;
        }

        /* Body — gradient from bright to dark */
        .s1 { background: #00e676; box-shadow: 0 0 8px #00e676;  animation-delay: .16s; z-index: 9; }
        .s2 { background: #00c853; box-shadow: 0 0 6px #00c853;  animation-delay: .32s; z-index: 8; }
        .s3 { background: #009624; box-shadow: 0 0 5px #009624;  animation-delay: .48s; z-index: 7; }
        .s4 { background: #007320; box-shadow: 0 0 4px #007320;  animation-delay: .64s; z-index: 6; }

        /* Tail — darkest, slightly less rounded */
        .s5 {
            background: #00491a;
            box-shadow: 0 0 3px #00491a;
            animation-delay: .80s;
            border-radius: 4px;
            z-index: 5;
        }

        /* ── Bottom bar ── */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 320px;
            margin-top: 12px;
            padding: 8px 14px;
            background: #ad1457;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .back-link {
            margin-top: 20px;
            color: #ad1457;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        .back-link:hover { text-decoration: underline; }

        @media (max-width: 380px) {
            .board { width: 272px; height: 272px; }
            .info-bar { width: 272px; }
            .board {
                background-size: 27.2px 27.2px;
            }
        }
    </style>
</head>
<body>

    <h1>🐍 CSS Snake</h1>
    <p class="subtitle">
        ✨ Pure HTML &amp; CSS — zero JavaScript!<br>
        Watch the snake slither across the board 🌸
    </p>

    <div class="board">
        <!--
            Food dots — cell centres (col*32+16, row*32+16):
              col 3 row 2 → (112, 80)
              col 7 row 4 → (240, 144)
              col 2 row 6 → (80,  208)
              col 8 row 8 → (272, 272)
              col 5 row 0 → (176,  16)
        -->
        <div class="food" style="left:112px; top: 80px;"></div>
        <div class="food" style="left:240px; top:144px;"></div>
        <div class="food" style="left: 80px; top:208px;"></div>
        <div class="food" style="left:272px; top:272px;"></div>
        <div class="food" style="left:176px; top: 16px;"></div>

        <!-- Snake (s0 = head → s5 = tail) -->
        <div class="seg s0"></div>
        <div class="seg s1"></div>
        <div class="seg s2"></div>
        <div class="seg s3"></div>
        <div class="seg s4"></div>
        <div class="seg s5"></div>
    </div>

    <div class="info-bar">
        <span>🐍 CSS Snake Game</span>
        <span>Pure CSS ✨</span>
    </div>

    <a class="back-link" href="index.html">← Back to Anvi's World</a>

</body>
</html>
