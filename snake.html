<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game – Anvi's World</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            font-family: Arial, sans-serif;
            background-color: #fce4ec;
        }

        h1 {
            font-size: 2rem;
            color: #ad1457;
            margin-bottom: 6px;
            text-align: center;
            animation: title-glow 2s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { text-shadow: 0 0 4px #f48fb1; }
            to   { text-shadow: 0 0 14px #ad1457, 0 0 6px #f48fb1; }
        }

        .subtitle {
            color: #6a1b9a;
            margin-bottom: 16px;
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
        }

        .canvas-wrap {
            position: relative;
            border: 3px solid #ad1457;
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(173,20,87,.45),
                inset 0 0 20px rgba(0,0,0,.5);
        }

        #gameCanvas {
            display: block;
            background-color: #0d1117;
        }

        /* Overlay shown on start / pause / game-over */
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13,17,23,.82);
            color: #fff;
            text-align: center;
            padding: 20px;
            gap: 12px;
        }

        #overlay h2 {
            font-size: 1.6rem;
            color: #69f0ae;
            text-shadow: 0 0 10px #69f0ae;
        }

        #overlay p {
            font-size: 14px;
            color: #f8bbd0;
            line-height: 1.7;
        }

        #overlay button {
            margin-top: 6px;
            padding: 10px 28px;
            background: #ad1457;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(173,20,87,.45);
            transition: background .2s;
        }

        #overlay button:hover { background: #880e4f; }

        #overlay.hidden { display: none; }

        /* Score / info bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 320px;
            margin-top: 12px;
            padding: 8px 14px;
            background: #ad1457;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .controls-hint {
            margin-top: 10px;
            font-size: 12px;
            color: #6a1b9a;
            text-align: center;
        }

        .back-link {
            margin-top: 16px;
            color: #ad1457;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>🐍 Snake Game</h1>
    <p class="subtitle">Use arrow keys or WASD to steer the snake 🌸</p>

    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="320" height="320"></canvas>

        <div id="overlay">
            <h2>🐍 Snake Game</h2>
            <p>Eat the 🍎 food to grow!<br>Avoid walls &amp; yourself.</p>
            <button id="actionBtn">▶ Start Game</button>
        </div>
    </div>

    <div class="info-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Best: <span id="best">0</span></span>
    </div>

    <p class="controls-hint">⬆⬇⬅➡ / WASD &nbsp;|&nbsp; P = Pause &nbsp;|&nbsp; Swipe on mobile</p>

    <a class="back-link" href="index.html">← Back to Anvi's World</a>

<script>
(function () {
    const COLS = 16, ROWS = 16, CELL = 20;   // 16×16 grid, 20 px cells = 320 px canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const overlay    = document.getElementById('overlay');
    const overlayH2  = overlay.querySelector('h2');
    const overlayP   = overlay.querySelector('p');
    const actionBtn  = document.getElementById('actionBtn');
    const scoreEl    = document.getElementById('score');
    const bestEl     = document.getElementById('best');

    let snake, dir, nextDir, food, score, best, loop, state;
    // state: 'idle' | 'playing' | 'paused' | 'over'

    best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
    bestEl.textContent = best;

    /* ── Initialise / reset a new game ── */
    function init() {
        const midX = Math.floor(COLS / 2);
        const midY = Math.floor(ROWS / 2);
        snake   = [
            { x: midX,     y: midY },
            { x: midX - 1, y: midY },
            { x: midX - 2, y: midY }
        ];
        dir     = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score   = 0;
        scoreEl.textContent = 0;
        spawnFood();
    }

    /* ── Place food at a random empty cell ── */
    function spawnFood() {
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
    }

    /* ── Main game tick ── */
    function tick() {
        dir = { ...nextDir };

        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // Wall collision
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
            endGame(); return;
        }
        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            endGame(); return;
        }

        snake.unshift(head);

        // Eat food
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.textContent = score;
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                localStorage.setItem('snakeBest', best);
            }
            spawnFood();
        } else {
            snake.pop();
        }

        draw();
    }

    /* ── Drawing ── */
    function draw() {
        // Background grid
        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 0.5;
        for (let c = 0; c <= COLS; c++) {
            ctx.beginPath();
            ctx.moveTo(c * CELL, 0);
            ctx.lineTo(c * CELL, canvas.height);
            ctx.stroke();
        }
        for (let r = 0; r <= ROWS; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * CELL);
            ctx.lineTo(canvas.width, r * CELL);
            ctx.stroke();
        }

        // Food
        const fx = food.x * CELL + CELL / 2;
        const fy = food.y * CELL + CELL / 2;
        ctx.fillStyle = '#ff4081';
        ctx.shadowColor = '#ff4081';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(fx, fy, CELL * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Snake
        snake.forEach(function(seg, i) {
            const t   = i / (snake.length - 1 || 1);
            const r   = Math.round(105 * (1 - t));          // 105→0
            const g   = Math.round(240 - 191 * t);         // 240→49
            const b   = Math.round(174 * (1 - t));          // 174→0
            ctx.fillStyle   = `rgb(${r},${g},${b})`;
            ctx.shadowColor = i === 0 ? '#69f0ae' : 'transparent';
            ctx.shadowBlur  = i === 0 ? 12 : 0;
            const pad = i === 0 ? 1 : 2;
            const radius = i === 0 ? 5 : 3;
            roundRect(
                seg.x * CELL + pad,
                seg.y * CELL + pad,
                CELL - pad * 2,
                CELL - pad * 2,
                radius
            );
        });
        ctx.shadowBlur = 0;
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y,     x + w, y + r,     r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x,     y + h, x,     y + h - r, r);
        ctx.lineTo(x,     y + r);
        ctx.arcTo(x,     y,     x + r, y,          r);
        ctx.closePath();
        ctx.fill();
    }

    /* ── Game-over ── */
    function endGame() {
        clearInterval(loop);
        state = 'over';
        overlayH2.textContent = '💀 Game Over';
        overlayP.innerHTML    = `Score: <strong>${score}</strong>${score >= best && score > 0 ? ' 🏆 New Best!' : ''}`;
        actionBtn.textContent = '🔄 Play Again';
        overlay.classList.remove('hidden');
    }

    /* ── Start / Restart ── */
    function startGame() {
        init();
        draw();
        overlay.classList.add('hidden');
        state = 'playing';
        clearInterval(loop);
        loop = setInterval(tick, 120);
    }

    /* ── Pause / Resume ── */
    function togglePause() {
        if (state === 'playing') {
            clearInterval(loop);
            state = 'paused';
            overlayH2.textContent = '⏸ Paused';
            overlayP.innerHTML    = 'Press P or tap to resume.';
            actionBtn.textContent = '▶ Resume';
            overlay.classList.remove('hidden');
        } else if (state === 'paused') {
            overlay.classList.add('hidden');
            state = 'playing';
            loop = setInterval(tick, 120);
        }
    }

    /* ── Button click ── */
    actionBtn.addEventListener('click', function () {
        if (state === 'idle' || state === 'over') {
            startGame();
        } else if (state === 'paused') {
            togglePause();
        }
    });

    /* ── Keyboard controls ── */
    document.addEventListener('keydown', function (e) {
        switch (e.key) {
            case 'ArrowUp':    case 'w': case 'W':
                if (dir.y !== 1)  nextDir = { x: 0, y: -1 };
                e.preventDefault(); break;
            case 'ArrowDown':  case 's': case 'S':
                if (dir.y !== -1) nextDir = { x: 0, y: 1 };
                e.preventDefault(); break;
            case 'ArrowLeft':  case 'a': case 'A':
                if (dir.x !== 1)  nextDir = { x: -1, y: 0 };
                e.preventDefault(); break;
            case 'ArrowRight': case 'd': case 'D':
                if (dir.x !== -1) nextDir = { x: 1, y: 0 };
                e.preventDefault(); break;
            case 'p': case 'P':
                if (state === 'playing' || state === 'paused') togglePause();
                break;
        }
    });

    /* ── Touch / swipe controls ── */
    let touchStart = null;
    canvas.addEventListener('touchstart', function (e) {
        const t = e.changedTouches[0];
        touchStart = { x: t.clientX, y: t.clientY };
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
        if (!touchStart) return;
        const t  = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        touchStart = null;

        if (state === 'idle' || state === 'over') { startGame(); return; }
        if (state === 'paused') { togglePause(); return; }

        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { togglePause(); return; }

        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0 && dir.x !== -1) nextDir = { x: 1,  y: 0 };
            else if (dx < 0 && dir.x !== 1)  nextDir = { x: -1, y: 0 };
        } else {
            if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1  };
            else if (dy < 0 && dir.y !== 1)  nextDir = { x: 0, y: -1 };
        }
        e.preventDefault();
    }, { passive: false });

    /* ── Initial state ── */
    state = 'idle';
    init();
    draw();
})();
</script>
</body>
</html>
